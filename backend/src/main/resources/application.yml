spring:
  application:
    name: ai-business-assistant

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_business_assistant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:ERprince@12}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4}
  ml:
    base-url: ${ML_API_BASE_URL:http://localhost:8000}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_TCyhbdilYQrSOn}
  key-secret: ${RAZORPAY_KEY_SECRET:mCiDkRA66IqH8bw3Twu4kXeh}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

csv:
  data-dir: ${CSV_DATA_DIR:../ml-models/data}
  backup-dir: ${CSV_BACKUP_DIR:../ml-models/data/backups}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  documents-dir: ${DOCUMENTS_DIR:./documents}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors-extra-origins: ${CORS_EXTRA_ORIGINS:}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:120}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ai.assistant: INFO
    org.hibernate.SQL: WARN
