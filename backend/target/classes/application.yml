spring:
  application:
    name: ai-business-assistant

  datasource:
    url: jdbc:mysql://localhost:3306/ai_business_assistant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ERprince@12
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000 # 24 hours in milliseconds

# AI Configuration
ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4
  ollama:
    base-url: http://localhost:11434
    model: llama2
  chromadb:
    host: localhost
    port: 8000

# ML API Configuration
ml:
  api:
    base-url: http://localhost:5000

# RAG Configuration
rag:
  chunk-size: 500
  chunk-overlap: 50
  embedding-model: all-minilm-l6-v2

# File Upload Configuration
file:
  upload-dir: ./uploads
  documents-dir: ./documents

# Logging
logging:
  level:
    com.ai.assistant: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
